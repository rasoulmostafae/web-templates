<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eleva Estates | Premium Real Estate 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --dark: #0a0a0a;
      --gray: #1a1a1a;
      --light: #f5f5f5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background:var(--dark); color:white; overflow-x:hidden; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    /* Navbar */
    nav {
      position: fixed;
      top:0; left:0; right:0;
      padding: 1.5rem 5%;
      display:flex; justify-content:space-between; align-items:center;
      z-index:1000; transition:0.4s;
    }
    nav.scrolled {
      background:rgba(10,10,10,0.95);
      backdrop-filter:blur(12px);
      padding:1rem 5%;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }
    .logo { font-size:2.2rem; font-weight:700; color:var(--gold); }
    .nav-links a { color:white; text-decoration:none; margin:0 1.8rem; font-weight:500; position:relative; }
    .nav-links a::after { content:''; position:absolute; bottom:-8px; left:0; width:0; height:2px; background:var(--gold); transition:0.3s; }
    .nav-links a:hover::after { width:100%; }

    /* Hero */
    .hero {
      height:100vh;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                  url('https://images.unsplash.com/photo-1600566752355-35792bedcfea?q=80&w=3164') center/cover no-repeat;
      display:flex; align-items:center; justify-content:center; text-align:center;
    }
    .hero h1 { font-size:6rem; margin-bottom:1rem; }
    .hero p { font-size:1.5rem; max-width:800px; margin:0 auto 2rem; }

    /* Search & Filters */
    .filters-section {
      padding:6rem 5% 4rem;
      background:var(--gray);
    }
    .search-bar {
      max-width:800px; margin:0 auto 3rem;
      position:relative;
    }
    .search-bar input {
      width:100%; padding:1.2rem 4rem 1.2rem 1.5rem;
      border:none; border-radius:50px;
      font-size:1.1rem; background:rgba(255,255,255,0.1);
      color:white; backdrop-filter:blur(10px);
    }
    .search-bar button {
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      background:var(--gold); border:none; width:50px; height:50px;
      border-radius:50%; color:black; font-size:1.3rem; cursor:pointer;
    }

    .filters {
      display:flex; flex-wrap:wrap; gap:1rem; justify-content:center; margin-bottom:3rem;
    }
    select, .price-range {
      padding:0.9rem 1.5rem; border:none; border-radius:50px;
      background:rgba(255,255,255,0.1); color:white; font-size:1rem;
    }
    .price-range input { width:120px; }

    /* Properties Grid */
    .properties-container {
      padding:2rem 5% 8rem;
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));
      gap:2.5rem;
    }
    .property-card {
      background:rgba(255,255,255,0.04);
      border-radius:20px;
      overflow:hidden;
      cursor:pointer;
      transition:0.4s;
      opacity:0;
      transform:translateY(60px);
    }
    .property-card:hover { transform:translateY(-15px); box-shadow:0 25px 50px rgba(212,175,55,0.15); }
    .property-card img {
      width:100%; height:260px; object-fit:cover; transition:0.5s;
    }
    .property-card:hover img { transform:scale(1.08); }
    .property-info {
      padding:1.6rem;
    }
    .property-info h3 { font-size:1.5rem; margin-bottom:0.5rem; }
    .price { color:var(--gold); font-size:1.9rem; font-weight:700; }
    .location { color:#aaa; font-size:0.95rem; margin:0.5rem 0; }
    .features { display:flex; gap:1rem; font-size:0.9rem; color:#ccc; margin-top:1rem; }

    .no-results {
      grid-column:1/-1; text-align:center; padding:4rem; font-size:1.4rem; color:#888;
    }

    footer {
      background:#000; padding:3rem; text-align:center; font-size:0.9rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">ELEVA</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Properties</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div>
      <h1>Discover Luxury Living</h1>
      <p>Exclusive homes in the world's most desirable locations</p>
    </div>
  </section>

  <!-- Search & Filters -->
  <section class="filters-section">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by location, name or keyword..." />
      <button><i class="fas fa-search"></i></button>
    </div>

    <div class="filters">
      <select id="typeFilter">
        <option value="all">All Types</option>
        <option value="house">House</option>
        <option value="apartment">Apartment</option>
        <option value="villa">Villa</option>
        <option value="penthouse">Penthouse</option>
      </select>

      <select id="locationFilter">
        <option value="all">All Locations</option>
        <option value="Miami">Miami</option>
        <option value="Los Angeles">Los Angeles</option>
        <option value="New York">New York</option>
        <option value="Dubai">Dubai</option>
        <option value="London">London</option>
      </select>

      <div class="price-range">
        <input type="number" id="minPrice" placeholder="Min Price" />
        <input type="number" id="maxPrice" placeholder="Max Price" />
      </div>

      <select id="bedsFilter">
        <option value="0">Any Beds</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="5">5+</option>
      </select>
    </div>
  </section>

  <!-- Properties Grid -->
  <section class="properties-container" id="propertiesGrid">
    <!-- JS will fill this -->
  </section>

  <footer>
    © 2025 Eleva Estates • Luxury Redefined
  </footer>

  <script>
    // Sample Property Data
    const properties = [
      { id:1, title:"Oceanfront Villa", price:6850000, location:"Miami", type:"villa", beds:6, baths:7, sqft:8200, img:"https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=2940" },
      { id:2, title:"Sky Penthouse", price:14900000, location:"New York", type:"penthouse", beds:4, baths:5, sqft:5800, img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2940" },
      { id:3, title:"Modern Mansion", price:12500000, location:"Los Angeles", type:"house", beds:8, baths:10, sqft:13500, img:"https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=2940" },
      { id:4, title:"Palm Jumeirah Villa", price:22000000, location:"Dubai", type:"villa", beds:7, baths:9, sqft:16000, img:"https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=2940" },
      { id:5, title:"Mayfair Residence", price:18500000, location:"London", type:"house", beds:6, baths:6, sqft:7200, img:"https://images.unsplash.com/photo-1564013799919-ab600027ffc6?q=80&w=2940" },
      { id:6, title:"Downtown Loft", price:4200000, location:"New York", type:"apartment", beds:3, baths:3, sqft:3200, img:"https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=2940" },
      { id:7, title:"Beverly Hills Estate", price:29800000, location:"Los Angeles", type:"house", beds:12, baths:15, sqft:25000, img:"https://images.unsplash.com/photo-1613977257365-707ba6527efa?q=80&w=2940" },
      { id:8, title:"Sunny Isles Penthouse", price:8900000, location:"Miami", type:"penthouse", beds:5, baths:6, sqft:6100, img:"https://images.unsplash.com/photo-1600566755190-0166f8e5e703?q=80&w=2940" }
    ];

    const grid = document.getElementById('propertiesGrid');

    function renderProperties(data) {
      grid.innerHTML = '';
      if (data.length === 0) {
        grid.innerHTML = '<div class="no-results">No properties found matching your criteria</div>';
        return;
      }

      data.forEach((prop, index) => {
        const card = document.createElement('div');
        card.className = 'property-card';
        card.style.animationDelay = `${index * 0.1}s`;

        card.innerHTML = `
          <img src="${prop.img}" alt="${prop.title}">
          <div class="property-info">
            <h3>${prop.title}</h3>
            <div class="location"><i class="fas fa-map-marker-alt"></i> ${prop.location}</div>
            <div class="price">$${prop.price.toLocaleString()}</div>
            <div class="features">
              <span><i class="fas fa-bed"></i> ${prop.beds}</span>
              <span><i class="fas fa-bath"></i> ${prop.baths}</span>
              <span><i class="fas fa-ruler-combined"></i> ${prop.sqft.toLocaleString()} sqft</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      // Animate cards on load
      gsap.from(".property-card", {
        opacity: 0,
        y: 80,
        duration: 0.9,
        stagger: 0.15,
        ease: "power3.out"
      });
    }

    // Initial render
    renderProperties(properties);

    // Filter Logic
    function filterProperties() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const type = document.getElementById('typeFilter').value;
      const location = document.getElementById('locationFilter').value;
      const minPrice = document.getElementById('minPrice').value || 0;
      const maxPrice = document.getElementById('maxPrice').value || Infinity;
      const minBeds = document.getElementById('bedsFilter').value;

      const filtered = properties.filter(p => {
        return (
          (search === '' || p.title.toLowerCase().includes(search) || p.location.toLowerCase().includes(search)) &&
          (type === 'all' || p.type === type) &&
          (location === 'all' || p.location === location) &&
          (p.price >= minPrice && p.price <= maxPrice) &&
          (minBeds == 0 || p.beds >= minBeds)
        );
      });

      renderProperties(filtered);
    }

    // Event Listeners
    document.querySelectorAll('#searchInput, #typeFilter, #locationFilter, #minPrice, #maxPrice, #bedsFilter').forEach(el => {
      el.addEventListener('input', filterProperties);
      el.addEventListener('change', filterProperties);
    });

    // Navbar scroll
    window.addEventListener('scroll', () => {
      document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 100);
    });

    // GSAP Hero Animation
    gsap.from(".hero h1", { opacity:0, y:80, duration:1.4, ease:"power4.out" });
    gsap.from(".hero p", { opacity:0, y:60, duration:1.2, delay:0.6, ease:"power3.out" });
  </script>
</body>
</html>
