<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueWave Realty — Find Your Perfect Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --blue: #2563eb;
      --light-blue: #60a5fa;
      --dark-blue: #1e40af;
      --white: #ffffff;
      --gray: #f1f5f9;
      --text: #1e293b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--gray);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1.5rem 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      transition: 0.4s;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(37,99,235,0.1);
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--blue);
    }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      margin: 0 1.5rem;
      font-weight: 500;
    }

    /* Hero with animated floating houses */
    .hero {
      height: 100vh;
      position: relative;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-house {
      position: absolute;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(37,99,235,0.2);
      opacity: 0;
      transform: translateY(100px) scale(0.8);
      animation: floatHouse 20s infinite ease-in-out;
    }
    .house1 { width: 380px; top: 15%; left: 8%; animation-delay: 0s; }
    .house2 { width: 420px; top: 20%; right: 10%; animation-delay: 4s; }
    .house3 { width: 360px; bottom: 20%; left: 12%; animation-delay: 8s; }
    .house4 { width: 400px; bottom: 18%; right: 14%; animation-delay: 12s; }
    .house5 { width: 340px; top: 35%; left: 45%; animation-delay: 16s; }

    @keyframes floatHouse {
      0%, 100% { 
        opacity: 0; 
        transform: translateY(100px) scale(0.8) rotate(3deg);
      }
      20%, 80% { 
        opacity: 1; 
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 900px;
      padding: 2rem;
    }
    .hero h1 {
      font-size: 4.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--dark-blue);
    }
    .hero p {
      font-size: 1.4rem;
      margin-bottom: 3rem;
      color: #475569;
    }

    /* Modern blue search bar + filters */
    .search-filter {
      background: white;
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(37,99,235,0.18);
      max-width: 1100px;
      margin: -100px auto 0;
      position: relative;
      z-index: 20;
    }
    .main-search {
      display: flex;
      margin-bottom: 2rem;
      border: 2px solid #e0e7ff;
      border-radius: 16px;
      overflow: hidden;
    }
    .main-search input {
      flex: 1;
      padding: 1.4rem 2rem;
      border: none;
      font-size: 1.2rem;
      outline: none;
    }
    .main-search button {
      background: var(--blue);
      color: white;
      border: none;
      padding: 0 3rem;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .main-search button:hover {
      background: var(--dark-blue);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
    }
    .filter-group select {
      width: 100%;
      padding: 1rem 1.5rem;
      border: 2px solid #e0e7ff;
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      color: var(--text);
    }

    /* Properties Grid */
    .properties-section {
      padding: 10rem 6% 6rem;
      background: white;
    }
    .section-title {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 4rem;
      color: var(--dark-blue);
    }
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 2.5rem;
    }
    .property-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(37,99,235,0.12);
      transition: 0.4s;
      opacity: 0;
      transform: translateY(60px);
    }
    .property-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 60px rgba(37,99,235,0.2);
    }
    .property-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }
    .property-info {
      padding: 1.8rem;
    }
    .price {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--blue);
    }
    .address {
      color: #64748b;
      margin: 0.8rem 0;
      font-size: 1.1rem;
    }
    .features {
      display: flex;
      gap: 1.2rem;
      color: #64748b;
      font-size: 0.95rem;
    }

    footer {
      background: var(--dark-blue);
      color: white;
      text-align: center;
      padding: 4rem;
      margin-top: 6rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">BlueWave</div>
    <div class="nav-links">
      <a href="#">Buy</a>
      <a href="#">Rent</a>
      <a href="#">Sell</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <!-- Animated floating houses -->
    <img src="https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=2940" alt="House 1" class="floating-house house1">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2940" alt="House 2" class="floating-house house2">
    <img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=2940" alt="House 3" class="floating-house house3">
    <img src="https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=2940" alt="House 4" class="floating-house house4">
    <img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea?q=80&w=2940" alt="House 5" class="floating-house house5">

    <div class="hero-content">
      <h1>Find Your Dream Home Today</h1>
      <p>Discover beautiful houses, modern apartments, and luxury villas in the best locations</p>
    </div>
  </section>

  <!-- Search + Filter -->
  <div class="search-filter">
    <div class="main-search">
      <input type="text" placeholder="Enter city, neighborhood or address...">
      <button>Search</button>
    </div>

    <div class="filters">
      <div class="filter-group">
        <select>
          <option>Property Type</option>
          <option>House</option>
          <option>Apartment</option>
          <option>Villa</option>
          <option>Townhouse</option>
        </select>
      </div>
      <div class="filter-group">
        <select>
          <option>Price Range</option>
          <option>Under $500K</option>
          <option>$500K - $1M</option>
          <option>$1M - $3M</option>
          <option>Over $3M</option>
        </select>
      </div>
      <div class="filter-group">
        <select>
          <option>Bedrooms</option>
          <option>1+</option>
          <option>2+</option>
          <option>3+</option>
          <option>5+</option>
        </select>
      </div>
      <div class="filter-group">
        <select>
          <option>Bathrooms</option>
          <option>1+</option>
          <option>2+</option>
          <option>3+</option>
          <option>4+</option>
        </select>
      </div>
    </div>
  </div>

  <section class="properties-section">
    <h2 class="section-title">Featured Properties</h2>
    <div class="properties-grid" id="propertiesGrid">
      <!-- Filled by JS -->
    </div>
  </section>

  <footer>
    © 2026 BlueWave Realty. All rights reserved.
  </footer>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Animate floating houses
    gsap.to(".floating-house", {
      opacity: 1,
      y: 0,
      scale: 1,
      duration: 2,
      stagger: 1.5,
      ease: "power3.out"
    });

    // Sample properties
    const properties = [
      {img:"https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=2940", price:"$2,850,000", address:"456 Ocean Drive, Miami Beach", beds:5, baths:4},
      {img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2940", price:"$4,200,000", address:"789 Park Avenue, New York", beds:4, baths:5},
      {img:"https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=2940", price:"$6,800,000", address:"123 Beverly Hills, Los Angeles", beds:7, baths:8},
      {img:"https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=2940", price:"$12,500,000", address:"Palm Jumeirah Villa, Dubai", beds:6, baths:7},
      {img:"https://images.unsplash.com/photo-1600566752355-35792bedcfea?q=80&w=2940", price:"$1,950,000", address:"Downtown Loft, Chicago", beds:3, baths:3},
      {img:"https://images.unsplash.com/photo-1613977257363-707ba6527efa?q=80&w=2940", price:"$3,400,000", address:"Modern Estate, Austin", beds:6, baths:6}
    ];

    const grid = document.getElementById('propertiesGrid');
    properties.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'property-card';
      card.innerHTML = `
        <img src="${p.img}" alt="Property">
        <div class="property-info">
          <div class="price">${p.price}</div>
          <div class="address">${p.address}</div>
          <div class="features">
            <span>Beds: ${p.beds}</span> • 
            <span>Baths: ${p.baths}</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    // Animate cards on scroll
    gsap.utils.toArray('.property-card').forEach((card, i) => {
      gsap.to(card, {
        opacity: 1,
        y: 0,
        duration: 1,
        delay: i * 0.1,
        ease: "power3.out",
        scrollTrigger: {
          trigger: card,
          start: "top 90%"
        }
      });
    });
  </script>
</body>
</html>
