<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMORA — The Most Animated Real-Estate Experience Ever</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <style>
    :root {
      --pink: #ff4e8f;
      --cyan: #00f2ff;
      --dark: #0f0a1f;
      --light: #faf8ff;
      --gray: #1a1129;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--dark);
      color: var(--light);
      font-family: 'Manrope', sans-serif;
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    /* Floating 3D Navbar */
    nav {
      position: fixed;
      top: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(15,10,35,0.7);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,78,143,0.3);
      border-radius: 80px;
      padding: 1.2rem 4rem;
      z-index: 9999;
      box-shadow: 0 30px 80px rgba(255,78,143,0.2);
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links a {
      color: #e0d8ff;
      text-decoration: none;
      margin: 0 2rem;
      font-weight: 600;
      transition: 0.4s;
    }
    .nav-links a:hover { color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }

    /* Hero with insane animated layers */
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .hero-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }
    .layer1 { background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=3200') center/cover; opacity: 0.4; }
    .layer2 { background: url('https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=3200') center/cover; opacity: 0.6; }
    .layer3 { background: url('https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=3200') center/cover; opacity: 0.5; }

    .hero-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    .hero h1 {
      font-size: 10rem;
      line-height: 0.9;
      background: linear-gradient(135deg, var(--pink), var(--cyan), #ff8ff4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 80px rgba(255,78,143,0.6);
    }
    .hero p {
      font-size: 2rem;
      margin: 2rem 0;
      opacity: 0.9;
    }

    /* Morphing Search Bar */
    .search-morph {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--pink), var(--cyan));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 30px 80px rgba(255,78,143,0.5);
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .search-morph.open {
      width: 90%;
      max-width: 1000px;
      height: 120px;
      border-radius: 80px;
      padding: 0 3rem;
    }
    .search-inner {
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 2rem;
      width: 100%;
    }
    .search-inner input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.6rem;
      outline: none;
    }
    .search-inner button {
      background: white;
      color: var(--dark);
      border: none;
      padding: 1rem 3rem;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Animated Property Grid */
    .properties {
      padding: 12rem 8% 8rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 4rem;
    }
    .property-card {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
    }
    .property-card img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      transition: transform 1s ease;
    }
    .property-card:hover img {
      transform: scale(1.15);
    }
    .card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem;
      background: linear-gradient(transparent, var(--dark));
      transform: translateY(100px);
    }
    .price {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Final Floating Video Sphere */
    .final-sphere {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2000px;
    }
    .sphere-video {
      width: 600px;
      height: 600px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 200px rgba(255,78,143,0.6);
      transform: rotateY(20deg);
    }
    .sphere-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">LUMORA</div>
    <div class="nav-links">
      <a href="#">Homes</a>
      <a href="#">Virtual</a>
      <a href="#">Concierge</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-layer layer1"></div>
    <div class="hero-layer layer2"></div>
    <div class="hero-layer layer3"></div>

    <div class="hero-content">
      <h1>LIVE<br>BEYOND</h1>
      <p>The future of extraordinary living</p>
    </div>

    <!-- Morphing Search -->
    <div class="search-morph" id="searchMorph">
      <i class="fas fa-search" style="font-size:2.5rem; color:white;"></i>
      <div class="search-inner">
        <input type="text" placeholder="Search the world’s finest homes...">
        <button>Explore</button>
      </div>
    </div>
  </section>

  <div class="properties" id="properties"></div>

  <!-- Floating 3D Video Sphere -->
  <section class="final-sphere">
    <div class="sphere-video">
      <video autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-aerial-panorama-of-a-luxury-resort-3336-large.mp4" type="video/mp4">
      </video>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger, MotionPathPlugin);

    // Parallax layers
    gsap.to(".layer1", { yPercent: -50, ease: "none", scrollTrigger: { trigger: ".hero", scrub: true } });
    gsap.to(".layer2", { yPercent: -30, ease: "none", scrollTrigger: { trigger: ".hero", scrub: true } });
    gsap.to(".layer3", { yPercent: -70, ease: "none", scrollTrigger: { trigger: ".hero", scrub: true } });

    // Hero text
    gsap.from(".hero h1", { y: 200, opacity: 0, duration: 2, ease: "power4.out" });
    gsap.from(".hero p", { y: 100, opacity: 0, duration: 1.8, delay: 0.8 });

    // Morphing search
    const morph = document.getElementById('searchMorph');
    morph.addEventListener('click', () => {
      morph.classList.toggle('open');
      gsap.to(".search-inner", { opacity: morph.classList.contains('open') ? 1 : 0, duration: 0.6 });
    });

    // Properties with wild animations
    const homes = [
      {img:"https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=3200", price:"$58M", title:"Cosmic Villa"},
      {img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=3200", price:"$92M", title:"Neon Sky Palace"},
      {img:"https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=3200", price:"$135M", title:"Quantum Estate"},
      {img:"https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=3200", price:"$79M", title:"Aurora Retreat"},
      {img:"https://images.unsplash.com/photo-1600566752355-35792bedcfea?q=80&w=3200", price:"$64M", title:"Stellar Haven"},
      {img:"https://images.unsplash.com/photo-1613977257363-707ba6527efa?q=80&w=3200", price:"$110M", title:"Elysian Crown"}
    ];

    const container = document.getElementById('properties');
    homes.forEach((h, i) => {
      const card = document.createElement('div');
      card.className = 'property-card';
      card.innerHTML = `
        <img src="${h.img}" alt="${h.title}">
        <div class="card-overlay">
          <div class="price">${h.price}</div>
          <h3>${h.title}</h3>
        </div>
      `;
      container.appendChild(card);

      // Insane entrance animation
      gsap.from(card, {
        opacity: 0,
        y: 400,
        rotation: () => gsap.utils.random(-30, 30),
        scale: 0.3,
        duration: 2,
        delay: i * 0.3,
        ease: "elastic.out(1,0.5)",
        scrollTrigger: { trigger: card, start: "top 90%" }
      });

      gsap.to(card.querySelector('.card-overlay'), {
        y: -100,
        duration: 1,
        scrollTrigger: { trigger: card, start: "top 70%" }
      });
    });

    // Floating video sphere
    gsap.to(".sphere-video", {
      rotationY: 380,
      rotationX: 20,
      ease: "none",
      scrollTrigger: {
        trigger: ".final-sphere",
        scrub: 1,
        start: "top bottom",
        end: "bottom top"
      }
    });
  </script>
</body>
</html>
