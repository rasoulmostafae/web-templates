<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — WebGL Liquid Real-Estate Experience 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      overflow: hidden; 
      background: #000; 
      font-family: 'Inter', sans-serif;
      color: white;
      height: 100vh;
    }
    canvas { position: fixed; top: 0; left: 0; z-index: 1; }
    
    /* Floating UI Overlay */
    .ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
    }
    .logo {
      position: absolute;
      top: 40px; left: 60px;
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(0,255,255,0.5);
      pointer-events: auto;
    }
    .nav {
      position: absolute;
      top: 50px; right: 60px;
      display: flex;
      gap: 3rem;
      pointer-events: auto;
    }
    .nav a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-weight: 600;
      transition: 0.4s;
    }
    .nav a:hover { color: #00ffff; text-shadow: 0 0 20px #00ffff; }

    /* Floating Search Orb */
    .search-orb {
      position: absolute;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 120px;
      background: rgba(0,255,255,0.2);
      border: 2px solid rgba(0,255,255,0.6);
      border-radius: 50%;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 0 80px rgba(0,255,255,0.6);
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .search-orb:hover {
      width: 900px;
      border-radius: 80px;
    }
    .search-inner {
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 2rem;
      width: 100%;
      padding: 0 3rem;
    }
    .search-inner input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.8rem;
      outline: none;
    }
    .search-inner button {
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      color: black;
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Property Cards (appear on interaction) */
    .property-card {
      position: absolute;
      width: 420px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,255,255,0.4);
      opacity: 0;
      pointer-events: auto;
      cursor: pointer;
    }
    .property-card img {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }
    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
    }
    .price {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="ui-overlay">
    <div class="logo">NEXUS</div>
    <div class="nav">
      <a href="#">Homes</a>
      <a href="#">Virtual</a>
      <a href="#">Concierge</a>
      <a href="#">Contact</a>
    </div>

    <!-- Floating Search Orb -->
    <div class="search-orb" id="orb">
      <i class="fas fa-search" style="font-size:3rem; color:cyan;"></i>
      <div class="search-inner">
        <input type="text" placeholder="Search the world's finest properties...">
        <button>Explore</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    // WebGL Liquid Background
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    // Liquid geometry
    const geometry = new THREE.SphereGeometry(5, 128, 128);
    const material = new THREE.ShaderMaterial({
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float time;
        void main() {
          vec2 p = vUv * 2.0 - 1.0;
          float d = length(p);
          vec3 color = 0.5 + 0.5 * cos(time + d * 10.0 + vec3(0.0, 2.0, 4.0));
          gl_FragColor = vec4(color * vec3(0.0, 0.8, 1.0) + vec3(1.0, 0.0, 1.0) * sin(d * 20.0 - time * 5.0), 0.8);
        }
      `,
      uniforms: { time: { value: 0 } },
      transparent: true
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Mouse interaction
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
      requestAnimationFrame(animate);
      material.uniforms.time.value += 0.02;
      mesh.rotation.y += 0.001;
      mesh.rotation.x = mouseY * 0.2;
      mesh.rotation.y += mouseX * 0.2;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Morphing search orb
    const orb = document.getElementById('orb');
    orb.addEventListener('click', () => {
      orb.classList.toggle('open');
      setTimeout(() => {
        document.querySelector('.search-inner').style.opacity = orb.classList.contains('open') ? 1 : 0;
      }, 400);
    });

    // Spawn property cards on click
    const homes = [
      {img:"https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=3200", price:"$89M", title:"Liquid Sky Villa"},
      {img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=3200", price:"$120M", title:"Neon Ocean Palace"},
      {img:"https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=3200", price:"$175M", title:"Quantum Horizon"},
      {img:"https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=3200", price:"$98M", title:"Aurora Reef Estate"}
    ];

    document.addEventListener('dblclick', () => {
      const card = document.createElement('div');
      card.className = 'property-card';
      const h = homes[Math.floor(Math.random() * homes.length)];
      card.innerHTML = `
        <img src="${h.img}" alt="${h.title}">
        <div class="card-info">
          <div class="price">${h.price}</div>
          <h3>${h.title}</h3>
        </div>
      `;
      card.style.left = Math.random() * 70 + 10 + '%';
      card.style.top = Math.random() * 60 + 20 + '%';
      document.body.appendChild(card);

      gsap.from(card, {
        scale: 0,
        rotation: 360,
        opacity: 0,
        duration: 1.5,
        ease: "elastic.out(1,0.5)"
      });
    });
  </script>
</body>
</html>
