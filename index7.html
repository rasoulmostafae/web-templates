<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elysian — Light & Animated Luxury Real Estate 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --cream: #faf8f5;
      --beige: #f5eee6;
      --gold: #d4af37;
      --soft-gold: #e8d9a6;
      --gray: #999;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--cream);
      color: #333;
      font-family: 'Manrope', sans-serif;
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    /* Elegant light navbar */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 2rem 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      transition: all 0.6s;
    }
    nav.scrolled {
      background: rgba(250,248,245,0.95);
      backdrop-filter: blur(20px);
      padding: 1.2rem 7%;
      box-shadow: 0 10px 40px rgba(212,175,55,0.1);
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
    }
    .nav-links a {
      color: #555;
      text-decoration: none;
      margin: 0 2rem;
      font-weight: 500;
      position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 1px;
      background: var(--gold); transition: 0.4s;
    }
    .nav-links a:hover::after { width: 100%; }

    /* Animated hero with floating elements */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #faf8f5 0%, #f5eee6 100%);
    }
    .floating-orb {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.15), transparent);
      filter: blur(40px);
      animation: float 20s infinite linear;
    }
    .orb1 { width: 600px; height: 600px; top: -10%; left: -10%; animation-delay: 0s; }
    .orb2 { width: 800px; height: 800px; bottom: -20%; right: -15%; animation-delay: 8s; }
    .orb3 { width: 500px; height: 500px; top: 20%; right: 10%; animation-delay: 15s; }
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(100px, -100px) rotate(360deg); }
    }

    .hero-content {
      position: relative;
      z-index: 10;
    }
    .hero h1 {
      font-size: 8.5rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(60px);
    }
    .hero p {
      font-size: 1.8rem;
      max-width: 800px;
      margin: 0 auto 3rem;
      opacity: 0;
      transform: translateY(40px);
    }
    .hero .btn {
      padding: 1.4rem 4rem;
      background: var(--gold);
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.4s;
    }
    .hero .btn:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(212,175,55,0.3); }

    /* Light filter bar */
    .filters {
      max-width: 1400px;
      margin: -100px auto 6rem;
      padding: 3rem;
      background: white;
      border-radius: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.08);
      position: relative;
      z-index: 10;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 2.5fr repeat(4, 1fr);
      gap: 1.5rem;
      align-items: center;
    }
    .search input {
      padding: 1.4rem 2rem;
      border: 1px solid #e0d9d0;
      border-radius: 50px;
      font-size: 1.1rem;
    }
    select {
      padding: 1.4rem 1.8rem;
      border: 1px solid #e0d9d0;
      border-radius: 50px;
      background: white;
    }

    /* Animated property cards */
    .properties {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 4rem 10rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
      gap: 4rem;
    }
    .property {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      cursor: pointer;
      opacity: 0;
      transform: translateY(80px);
    }
    .property img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      transition: transform 0.8s ease;
    }
    .property:hover img { transform: scale(1.06); }
    .property-info {
      padding: 2.5rem;
    }
    .price {
      font-size: 2.6rem;
      color: var(--gold);
      font-weight: 700;
    }
    .title {
      font-size: 2rem;
      margin: 0.8rem 0;
      color: #222;
    }
    .location {
      color: var(--gray);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Light modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      inset: 0;
      background: rgba(250,248,245,0.98);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 1200px;
      width: 100%;
      box-shadow: 0 40px 100px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .modal-header {
      padding: 3rem;
      text-align: center;
      background: linear-gradient(135deg, #f5eee6, white);
    }
    .modal-header h2 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    .modal-price {
      font-size: 3rem;
      color: var(--gold);
    }
    .modal-body {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 3rem;
      padding: 4rem;
    }
    .gallery img { border-radius: 20px; width: 100%; margin-bottom: 1rem; }
    .booking-form {
      background: #f9f5f0;
      padding: 2.5rem;
      border-radius: 24px;
    }
    .submit-btn {
      width: 100%;
      padding: 1.4rem;
      background: var(--gold);
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 6rem;
      background: white;
      font-size: 0.95rem;
      color: #888;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">ELYSIAN</div>
    <div class="nav-links">
      <a href="#">Collection</a>
      <a href="#">Destinations</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg">
      <div class="floating-orb orb1"></div>
      <div class="floating-orb orb2"></div>
      <div class="floating-orb orb3"></div>
    </div>
    <div class="hero-content">
      <h1>Elegance<br>in Motion</h1>
      <p>Timeless residences animated by light, space, and refined luxury</p>
      <button class="btn">Explore the Collection</button>
    </div>
  </section>

  <div class="filters">
    <div class="filter-row">
      <div class="search"><input type="text" placeholder="Capri, Gstaad, Malibu..."></div>
      <select><option>All Types</option><option>Villa</option><option>Chalet</option><option>Penthouse</option></select>
      <select><option>All Regions</option><option>Europe</option><option>Americas</option><option>Caribbean</option></select>
      <input type="number" placeholder="Min Price">
      <input type="number" placeholder="Max Price">
    </div>
  </div>

  <div class="properties" id="properties"></div>

  <!-- Light Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Villa Aurora</h2>
        <p class="modal-price">$38,000,000</p>
        <p style="margin-top:1rem; color:#777;">Amalfi Coast, Italy</p>
      </div>
      <div class="modal-body">
        <div class="gallery">
          <img src="https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=2940" alt="">
          <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2940" alt="">
        </div>
        <div class="booking-form">
          <h3>Inquire Privately</h3>
          <form>
            <input type="text" placeholder="Full Name" required style="width:100%; padding:1rem; margin:1rem 0; border:1px solid #ddd; border-radius:12px;">
            <input type="email" placeholder="Email" required style="width:100%; padding:1rem; margin:1rem 0; border:1px solid #ddd; border-radius:12px;">
            <input type="tel" placeholder="Telephone" style="width:100%; padding:1rem; margin:1rem 0; border:1px solid #ddd; border-radius:12px;">
            <textarea placeholder="Message (optional)" rows="4" style="width:100%; padding:1rem; margin:1rem 0; border:1px solid #ddd; border-radius:12px;"></textarea>
            <button type="submit" class="submit-btn">Send Request</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer>© 2026 Elysian Residences — Where Light Meets Luxury</footer>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Hero animation
    gsap.to(".hero h1", { opacity:1, y:0, duration:1.6, ease:"power4.out" });
    gsap.to(".hero p", { opacity:1, y:0, duration:1.4, delay:0.6, ease:"power3.out" });
    gsap.to(".hero .btn", { opacity:1, y:0, duration:1.2, delay:1.2, ease:"power3.out" });

    // Property cards animation
    const properties = [
      {title:"Villa Aurora", price:38000000, location:"Amalfi Coast", img:"https://images.unsplash.com/photo-1613490493576-7fbeec5325f3?q=80&w=2940"},
      {title:"Chalet Lumen", price:65000000, location:"Courchevel 1850", img:"https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?q=80&w=2940"},
      {title:"Ocean Pearl", price:92000000, location:"Barbados", img:"https://images.unsplash.com/photo-1582719471384-8949374d0ef9?q=80&w=2940"},
      {title:"Sky Pavilion", price:48000000, location:"Capri", img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2940"}
    ];

    document.getElementById('properties').innerHTML = properties.map(p => `
      <div class="property" onclick="document.getElementById('modal').style.display='flex'">
        <img src="${p.img}" alt="${p.title}">
        <div class="property-info">
          <div class="price">$${p.price.toLocaleString()}</div>
          <div class="title">${p.title}</div>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
        </div>
      </div>
    `).join('');

    gsap.utils.toArray(".property").forEach((card, i) => {
      gsap.to(card, {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: "power3.out",
        scrollTrigger: {
          trigger: card,
          start: "top 85%",
          toggleActions: "play none none reverse"
        }
      });
    });

    // Close modal
    document.querySelector('.modal').addEventListener('click', e => {
      if (e.target === document.querySelector('.modal')) 
        document.querySelector('.modal').style.display = 'none';
    });
  </script>
</body>
</html>
